name: 🔄69yun auto Check-In

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC 执行，调整为你需要的时间
  workflow_dispatch:  # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # 可以根据实际需要修改 Node.js 版本

    - name: Install dependencies
      run: |
        npm install
        npm install node-fetch

    - name: Run scheduled check-in
      run: |
        node 69yun_check_in.js  
      env:
        JC_TYPE: ${{ secrets.JC_TYPE }} 
        DOMAIN: ${{ secrets.YUN69_DOMAIN }}  
        USERNAME: ${{ secrets.YUN69_USERNAME }}
        PASSWORD: ${{ secrets.YUN69_PASSWORD }}
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_CHAT_ID }}
