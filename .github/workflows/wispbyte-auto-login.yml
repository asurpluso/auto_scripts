
name: 🔄 wispbyte-auto-login

on:
  schedule:
    - cron: '16 18 2,16 * *' 
  workflow_dispatch:

permissions:
  contents: write # 授予工作流写入仓库内容的权限

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Start Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.WISPBYTE_TG_CHAT_ID }}
          token: ${{ secrets.WISPBYTE_TG_BOT_TOKEN }}
          message: "*Wispbyte 任务已启动！*\n预计 8–12 分钟完成\n查看: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          format: markdown

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          echo "开始安装依赖（预计 3–6 分钟）"
          set -e
          pip install --quiet playwright aiohttp
          playwright install chromium --with-deps
          echo "依赖安装完成"

      - name: Run login script
        timeout-minutes: 6
        env:
          TG_BOT_TOKEN: ${{ secrets.WISPBYTE_TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.WISPBYTE_TG_CHAT_ID }}
          LOGIN_ACCOUNTS: ${{ secrets.WISPBYTE_LOGIN_ACCOUNTS }}
        run: |
          echo "开始执行 wispbyte_auto_login.py（最多 5 分钟）"
          timeout 5m python wispbyte_auto_login.py && echo "lwispbyte_auto_login.py 成功完成" || echo "脚本执行失败或被超时中断"
          echo "本 step 结束"

            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3

      - name: ⏱️ 提交时间文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p wispbyte  && echo "$(date +'%Y-%m-%d %H:%M:%S')" > wispbyte/time.txt
          git add wispbyte/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 wispbyte 时间文件: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi

  notify-failure:
    needs: login
    if: needs.login.result == 'cancelled' || needs.login.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Alert
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          message: "*GitHub Actions 异常*\n\n状态：`${{ needs.login.result }}`\n${{ needs.login.result == 'cancelled' && '超时自动取消' || '脚本执行失败' }}\n\n查看日志：\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n发 `/retry` 手动重试"
          format: markdown
