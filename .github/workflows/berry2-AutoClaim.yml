name: 🔄 BerryHost2 Auto Claim
on:
  workflow_dispatch:
  schedule:
    - cron: '40 1 * * *'   # 每天 UTC 01:40（北京时间 09:40）
env:
  PROJECT_DIR: berry2
  BERRY_BATCH_ACCOUNTS: ${{ secrets.BERRY2_BATCH_ACCOUNTS }}
  HY2_PROXY_URL: ${{ secrets.BERRY2_HY2_PROXY_URL }}
  SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
permissions:
  contents: write
concurrency:
  group: berry-claim-${{ github.ref }}
  cancel-in-progress: false
  
jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 检出公开库代码
        uses: actions/checkout@v4

      - name: 📥 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto_berry_renew_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      - name: 🐍 安装 Python 依赖
        run: |
          pip install requests[socks]

      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      - name: 🎮 执行每日领取
        env:
          BERRY_BATCH_ACCOUNTS: ${{ env.BERRY_BATCH_ACCOUNTS }}
          HY2_PROXY_URL: ${{ env.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ env.SOCKS_PORT }}
        run: |
          cd ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          python berry.py

      - name: 提交执行时间到公开库
        if: always()
        run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # 1. 确保目录存在并更新时间
        mkdir -p ${{ env.PROJECT_DIR }}
        TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
        echo "$TIMESTAMP" > ${{ env.PROJECT_DIR }}/time.txt

        # 2. 检查是否有实际变动
        git add ${{ env.PROJECT_DIR }}/time.txt
        if git diff --cached --quiet; then
          echo "⚠️ 无变化，无需提交"
          exit 0
        fi

        # 3. 提交更改
        git commit -m "⏱️ 更新 ${{ env.PROJECT_DIR }} 执行时间: $TIMESTAMP"

        # 4. 核心优化：循环重试推送，解决并发冲突
        # 尝试最多 5 次推送，每次失败先拉取远程更新再重试
        for i in {1..5}; do
          echo "尝试推送第 $i 次..."
        
          # 尝试拉取并变基 (Rebase)，确保本地提交在远程提交之后
          if git pull --rebase origin main; then
            # 如果拉取成功，尝试推送
            if git push origin main; then
              echo "✅ 更改已成功推送到公开库"
              exit 0
            fi
          fi
          
          echo "❌ 推送冲突，等待 5 秒后重试..."
          sleep 5
        done

        echo "误差：经过多次尝试后依然无法推送成功。"
        exit 1
